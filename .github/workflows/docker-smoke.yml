name: docker-smoke

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t dart-stakeholder .
      - run: docker run --rm dart-stakeholder --list-values
      - run: docker run --rm dart-stakeholder --focus-family code_analyzer --output-format json --seed docker-code
      - run: docker run --rm dart-stakeholder --focus-family data_processing --output-format json --seed docker-data
      - run: docker run --rm dart-stakeholder --focus-family agent_workflows --output-format json --seed docker-agent
      - run: docker run --rm dart-stakeholder --focus-family delivery_preview_ops --output-format json --seed docker-delivery
      - shell: bash
        run: |
          first=$(docker run --rm dart-stakeholder --focus-family platform_engineering --output-format json --seed same-seed)
          second=$(docker run --rm dart-stakeholder --focus-family platform_engineering --output-format json --seed same-seed)
          test "$first" = "$second"
      - shell: bash
        run: |
          set +e
          docker run --rm dart-stakeholder --experimental-provider openai-compatible >/tmp/dart-provider.out 2>/tmp/dart-provider.err
          code=$?
          set -e
          test "$code" -eq 1
          grep -q 'experimental-provider is not implemented yet in dart-stakeholder' /tmp/dart-provider.err
