name: ci-native

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - shell: bash
        run: dart pub get
      - shell: bash
        run: python3 scripts/validate_scaffold.py
      - shell: bash
        run: dart format --set-exit-if-changed .
      - shell: bash
        run: dart analyze
      - shell: bash
        run: dart test
      - shell: bash
        run: mkdir -p build && dart compile exe bin/stakeholder.dart -o build/stakeholder
